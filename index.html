    // === FUNGSI MANDATORY & HELPER ===

    // Mencegah XSS (meskipun tidak ada input user antar pengguna di app publik ini)
    function escapeHTML(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(String(str)));
      return div.innerHTML;
    }

    // Defensive date format
    function safeDate(val) {
      if (!val) return '-';
      if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}/)) return val.substring(0, 10);
      try {
        var d = new Date(val);
        if (isNaN(d.getTime())) return '-';
        return d.toISOString().substring(0, 10);
      } catch (e) { return '-'; }
    }

    // Promise wrapper untuk memanggil server GAS dari luar (GitHub Pages)
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbx36J-ODB0sr7kyTAzf9VTX3jP8wZx31OGabZMP7I9ATycs3_OgHBZPw6IIoYQmdV5Ujw/exec'; // WAJIB DIISI DENGAN URL GAS!

    function gasRun(funcName) {
      var args = Array.prototype.slice.call(arguments, 1);
      return new Promise(function(resolve, reject) {
        // Susun paket data yang akan dikirim
        var requestBody = {
          action: funcName,
          token: args[0],
          payload: args[1]
        };

        // Kirim menggunakan jembatan fetch internet standar
        fetch(WEBAPP_URL, {
          method: 'POST',
          body: JSON.stringify(requestBody),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' } // Standar wajib GAS API
        })
        .then(function(response) { return response.json(); })
        .then(function(data) { resolve(data); })
        .catch(function(error) { reject(error); });
      });
    }

    // Page Navigation Logic
    function showPage(pageName, navEl) {
      activePage = pageName;
      
      // Update UI Navigation
      document.querySelectorAll('.nav-item-custom').forEach(function(n) {
        n.classList.remove('active');
      });
      if (navEl) {
        navEl.classList.add('active');
      } else {
        var defaultNav = document.getElementById('nav-' + pageName);
        if(defaultNav) defaultNav.classList.add('active');
      }
      
      // Close mobile sidebar
      if (window.innerWidth < 992) {
        var sidebar = document.querySelector('.sidebar');
        var overlay = document.querySelector('.sidebar-overlay');
        if (sidebar) sidebar.classList.remove('active');
        if (overlay) overlay.classList.remove('active');
      }
      
      loadPageData(pageName);
    }

    // Fetch and Render Content
    function loadPageData(pageName) {
      var requestedPage = pageName;
      showSectionLoading('viewContainer');
      
      // Simulasi fetch data dari server (UX halus)
      setTimeout(function() {
        if (activePage !== requestedPage) return; // Stale Check
        
        var container = document.getElementById('viewContainer');
        if(container) {
          container.innerHTML = pageContents[pageName] || '<p>Konten tidak ditemukan</p>';
        }
        window.scrollTo(0, 0);
      }, 400); // Waktu muat 400ms untuk efek transisi mulus
    }

    // Interactive Quiz Logic (Diekspos ke window)
    window.checkQuiz = function(quizId) {
      var inputId = 'input_' + quizId;
      var feedbackId = 'fb_' + quizId;
      var inputEl = document.getElementById(inputId);
      var feedbackEl = document.getElementById(feedbackId);
      
      if(!inputEl || !feedbackEl) return;
      var input = inputEl.value;
      
      if (!input) {
        feedbackEl.innerHTML = '<div class="alert alert-warning py-1 px-2 mt-2 mb-0 small border-0"><i class="fa-solid fa-triangle-exclamation me-1"></i> Ketik jawaban Anda terlebih dahulu.</div>';
        return;
      }
      
      // Normalisasi input: hapus spasi, huruf besar, ganti titik koma jadi koma, ratakan tanda kutip
      var normalized = input.replace(/\s+/g, '').toUpperCase().replace(/;/g, ',').replace(/['"]/g, '"');
      var answersArray = quizAnswers[quizId] || [];
      var isCorrect = false;
      
      for(var i = 0; i < answersArray.length; i++) {
        var expected = answersArray[i].replace(/\s+/g, '').toUpperCase().replace(/;/g, ',').replace(/['"]/g, '"');
        if(normalized === expected) {
          isCorrect = true;
          break;
        }
      }
      
      if(isCorrect) {
        feedbackEl.innerHTML = '<div class="alert alert-success py-2 px-3 mt-2 mb-0 small border-0 fw-bold"><i class="fa-solid fa-check-circle me-1"></i> Luar Biasa! Rumus Anda tepat.</div>';
        inputEl.classList.add('is-valid');
        inputEl.classList.remove('is-invalid');
      } else {
        feedbackEl.innerHTML = '<div class="alert alert-danger py-2 px-3 mt-2 mb-0 small border-0"><i class="fa-solid fa-times-circle me-1"></i> <strong>Kurang tepat.</strong><br>Periksa lagi penggunaan tanda baca (koma/tanda kutip) dan logika fungsinya.</div>';
        inputEl.classList.add('is-invalid');
        inputEl.classList.remove('is-valid');
      }
    };

    // Fungsi untuk menampilkan Petunjuk
    window.showHint = function(quizId) {
      var extraEl = document.getElementById('extra_' + quizId);
      if(!extraEl) return;
      var hintText = quizExtras[quizId].hint;
      extraEl.innerHTML = '<div class="alert alert-warning py-2 px-3 mb-2 small border-0 shadow-sm"><i class="fa-solid fa-lightbulb text-warning me-1"></i> <strong>Petunjuk:</strong> ' + hintText + '</div>';
      extraEl.classList.remove('d-none');
    };

   // (Fungsi showAnswer telah dihapus agar siswa tidak bisa curang)
    // Fungsi Upload File ke Server
    window.handleUpload = function() {
      var nameInput = document.getElementById('studentName');
      var fileInput = document.getElementById('studentFile');
      var btn = document.getElementById('btnUpload');
      var alertBox = document.getElementById('uploadAlert');
      
      var name = nameInput.value.trim();
      if (!name) {
        alertBox.innerHTML = '<div class="alert alert-warning small border-0 py-2"><i class="fa-solid fa-triangle-exclamation me-1"></i> Mohon isi Nama Lengkap Anda.</div>';
        return;
      }
      if (fileInput.files.length === 0) {
        alertBox.innerHTML = '<div class="alert alert-warning small border-0 py-2"><i class="fa-solid fa-triangle-exclamation me-1"></i> Silakan pilih file Excel terlebih dahulu.</div>';
        return;
      }
      
      var file = fileInput.files[0];
      var reader = new FileReader();
      
      // Update UI (Tier 3 Loading Style)
      var originalBtnText = btn.innerHTML;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Mengupload...';
      btn.disabled = true;
      alertBox.innerHTML = '';
      
      reader.onload = function(e) {
        var dataUrl = e.target.result;
        var base64 = dataUrl.split(',')[1];
        
        var payload = {
          studentName: name,
          filename: file.name,
          mimeType: file.type || 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
          base64: base64
        };
        
        if (typeof google === 'undefined') {
          // Mode Simulasi/Preview
          setTimeout(function() {
             btn.innerHTML = '<i class="fa-solid fa-check me-2"></i> Berhasil Diupload';
             btn.classList.replace('btn-primary', 'btn-success');
             alertBox.innerHTML = '<div class="alert alert-success small border-0 py-2"><i class="fa-solid fa-check-circle me-1"></i> (Simulasi) File atas nama <strong>' + escapeHTML(name) + '</strong> berhasil dikirim!</div>';
             
             setTimeout(function() {
               btn.innerHTML = originalBtnText;
               btn.disabled = false;
               btn.classList.replace('btn-success', 'btn-primary');
               nameInput.value = '';
               fileInput.value = '';
             }, 3000);
          }, 1500);
          return;
        }
        
        // Eksekusi gasRun ke server (Google Apps Script)
        gasRun('uploadFile', sessionToken, payload)
          .then(function(res) {
             if(handleSessionExpired(res)) return;
             if(res.success) {
               btn.innerHTML = '<i class="fa-solid fa-check me-2"></i> Berhasil Diupload';
               btn.classList.replace('btn-primary', 'btn-success');
               nameInput.value = '';
               fileInput.value = '';
               alertBox.innerHTML = '<div class="alert alert-success small border-0 py-2"><i class="fa-solid fa-check-circle me-1"></i> File Anda berhasil dikirim ke server. Terima kasih!</div>';
               
               // Kembalikan status tombol setelah 3 detik
               setTimeout(function() {
                 btn.innerHTML = originalBtnText;
                 btn.disabled = false;
                 btn.classList.replace('btn-success', 'btn-primary');
               }, 3000);
               
             } else {
               btn.innerHTML = originalBtnText;
               btn.disabled = false;
               alertBox.innerHTML = '<div class="alert alert-danger small border-0 py-2"><i class="fa-solid fa-times-circle me-1"></i> Gagal: ' + escapeHTML(res.message) + '</div>';
             }
          })
          .catch(function(err) {
             btn.innerHTML = originalBtnText;
             btn.disabled = false;
             alertBox.innerHTML = '<div class="alert alert-danger small border-0 py-2"><i class="fa-solid fa-times-circle me-1"></i> Error koneksi: ' + escapeHTML(err.message) + '</div>';
          });
      };
      
      reader.readAsDataURL(file);
    };

    // Public Logout (Reset)
    window.logout = function() {
      checkLoginState();
    };

    // Expose mandatory functions
    window.showPage = showPage;
    window.loadPageData = loadPageData;

    // DOM Ready Initialization
    document.addEventListener('DOMContentLoaded', function() {
      checkLoginState();
      console.log('App generated using GAS WebApp Builder');
    });

  })();
  </script>
</body>
